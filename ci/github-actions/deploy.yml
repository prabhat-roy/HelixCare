name: Deploy
on:
  push:
    branches: [main]
    tags: ['v*']
jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write, id-token: write }
    strategy:
      matrix:
        service: [api-gateway, fhir-gateway, ehr-core, prescription-service, video-consultation, hipaa-audit-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: harbor.helixcare.internal, username: ${{ secrets.HARBOR_USER }}, password: ${{ secrets.HARBOR_TOKEN }} }
      - uses: docker/build-push-action@v6
        with:
          context: src/${{ matrix.service }}
          push: true
          tags: harbor.helixcare.internal/helixcare/${{ matrix.service }}:${{ github.sha }}
          provenance: true
          sbom: true
      - uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes harbor.helixcare.internal/helixcare/${{ matrix.service }}:${{ github.sha }}
  argocd-sync:
    needs: build-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cloud:  [aws, gcp, azure]
        region: [us-east-1, us-central1, eastus]
    steps:
      - run: argocd app sync helixcare-${{ matrix.cloud }}-${{ matrix.region }} --grpc-web
