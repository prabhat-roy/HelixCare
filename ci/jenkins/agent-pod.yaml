apiVersion: v1
kind: Pod
spec:
  serviceAccountName: jenkins-agent
  containers:
    - name: build
      image: harbor.helixcare.internal/ci/jenkins-agent:latest
      command: [cat]
      tty: true
      resources: { requests: { cpu: 500m, memory: 1Gi }, limits: { cpu: 4000m, memory: 8Gi } }
    - name: docker
      image: docker:25-dind
      securityContext: { privileged: true }
      env: [{ name: DOCKER_TLS_CERTDIR, value: "" }]
