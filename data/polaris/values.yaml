# Apache Polaris — Iceberg REST catalog with RBAC + multi-engine support
image: { repository: apache/polaris, tag: latest }
polaris:
  realm: helixcare
  storage:
    s3: { endpoint: http://minio.helixcare.svc:9000, region: us-east-1, bucket: helixcare-iceberg-warehouse }
ingress: { enabled: true, hosts: [{ host: polaris.helixcare.internal }] }
