# HelixCare — local development stack.
# Synthetic PHI only. NEVER load real PHI into this stack.
#
# Usage:
#   make compose-up       # start stack
#   make compose-down     # stop stack
#
# Components:
#  - PostgreSQL (patient, encounter, billing, claims)
#  - MongoDB (FHIR resource cache, clinical notes)
#  - Redis (sessions, telehealth signalling state)
#  - Cassandra (audit log)
#  - TimescaleDB (vitals, remote monitoring)
#  - Elasticsearch (clinical search)
#  - Kafka (FHIR Bundle bus)
#  - NATS JetStream (telehealth signalling, alerts)
#  - Keycloak (OIDC, SMART-on-FHIR)
#  - HashiCorp Vault (PHI envelope encryption keys)
#  - HAPI FHIR (HL7 FHIR R4 reference server)
#  - Orthanc (DICOM)
#  - MinIO (S3-compatible imaging blob store)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helixcare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helixcare}
      POSTGRES_DB: ${POSTGRES_DB:-helixcare}
    ports: [ "5432:5432" ]
    volumes: [ "postgres-data:/var/lib/postgresql/data" ]

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: helixcare
      POSTGRES_PASSWORD: helixcare
      POSTGRES_DB: vitals
    ports: [ "5433:5432" ]
    volumes: [ "timescale-data:/var/lib/postgresql/data" ]

  mongodb:
    image: mongo:7
    ports: [ "27017:27017" ]
    volumes: [ "mongo-data:/data/db" ]

  redis:
    image: redis:7-alpine
    ports: [ "6379:6379" ]
    volumes: [ "redis-data:/data" ]

  cassandra:
    image: cassandra:5
    ports: [ "9042:9042" ]
    environment:
      CASSANDRA_CLUSTER_NAME: helixcare-audit
    volumes: [ "cassandra-data:/var/lib/cassandra" ]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports: [ "9200:9200" ]

  kafka:
    image: bitnami/kafka:3.7
    ports: [ "9092:9092" ]
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    ports: [ "8081:8081" ]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on: [ kafka ]

  nats:
    image: nats:2.10-alpine
    command: [ "-js", "-m", "8222" ]
    ports: [ "4222:4222", "8222:8222" ]

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: [ "start-dev" ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: [ "8080:8080" ]

  vault:
    image: hashicorp/vault:1.18
    cap_add: [ "IPC_LOCK" ]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: [ "8200:8200" ]

  hapi-fhir:
    image: hapiproject/hapi:v7.4.0
    ports: [ "8090:8080" ]
    environment:
      hapi.fhir.fhir_version: R4

  orthanc:
    image: jodogne/orthanc-plugins:1.12.4
    ports: [ "8042:8042", "4242:4242" ]
    volumes: [ "orthanc-data:/var/lib/orthanc/db" ]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: [ "9000:9000", "9001:9001" ]

  prometheus:
    image: prom/prometheus:v2.55.0
    ports: [ "9090:9090" ]
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    ports: [ "3001:3000" ]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

  loki:
    image: grafana/loki:3.2.0
    ports: [ "3100:3100" ]

  jaeger:
    image: jaegertracing/all-in-one:1.60
    ports: [ "16686:16686", "4317:4317", "4318:4318" ]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  postgres-data:
  timescale-data:
  mongo-data:
  redis-data:
  cassandra-data:
  orthanc-data:
