apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: api-gateway, namespace: helixcare-platform }
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - analysis: { templates: [{ templateName: helixcare-canary-analysis }], args: [{ name: service-name, value: api-gateway }] }
        - setWeight: 25
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector: { matchLabels: { app.kubernetes.io/name: api-gateway } }
  template:
    metadata: { labels: { app.kubernetes.io/name: api-gateway } }
    spec:
      containers:
        - name: api-gateway
          image: harbor.helixcare.internal/helixcare/api-gateway:latest
          ports: [{ containerPort: 50000 }]
