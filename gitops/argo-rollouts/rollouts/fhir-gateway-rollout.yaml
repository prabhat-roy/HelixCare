apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: fhir-gateway, namespace: helixcare-platform }
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - analysis: { templates: [{ templateName: helixcare-canary-analysis }], args: [{ name: service-name, value: fhir-gateway }] }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector: { matchLabels: { app.kubernetes.io/name: fhir-gateway } }
  template:
    metadata: { labels: { app.kubernetes.io/name: fhir-gateway } }
    spec:
      containers:
        - { name: fhir-gateway, image: harbor.helixcare.internal/helixcare/fhir-gateway:latest, ports: [{ containerPort: 50005 }] }
