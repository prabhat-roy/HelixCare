# Blue-green for clinical-decision-affecting service per CLAUDE.md
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: prescription-service, namespace: helixcare-pharmacy }
spec:
  replicas: 3
  strategy:
    blueGreen:
      activeService: prescription-service-active
      previewService: prescription-service-preview
      autoPromotionEnabled: false
      prePromotionAnalysis:
        templates: [{ templateName: helixcare-canary-analysis }]
        args: [{ name: service-name, value: prescription-service }]
      postPromotionAnalysis:
        templates: [{ templateName: helixcare-canary-analysis }]
        args: [{ name: service-name, value: prescription-service }]
  selector: { matchLabels: { app.kubernetes.io/name: prescription-service } }
  template:
    metadata: { labels: { app.kubernetes.io/name: prescription-service } }
    spec:
      containers:
        - name: prescription-service
          image: harbor.helixcare.internal/helixcare/prescription-service:latest
          ports: [{ containerPort: 50500 }]
