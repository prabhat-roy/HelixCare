apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata: { name: helixcare-aws-us-west-2, namespace: argocd }
spec:
  generators:
    - git:
        repoURL: https://github.com/prabhat-roy/HelixCare.git
        revision: HEAD
        directories: [{ path: helm/charts/* }]
  template:
    metadata:
      name: '{{path.basename}}-aws-us-west-2'
      labels: { cloud: aws, region: us-west-2 }
    spec:
      project: helixcare
      source:
        repoURL: https://github.com/prabhat-roy/HelixCare.git
        targetRevision: HEAD
        path: '{{path}}'
        helm: { valueFiles: [values.yaml, values-aws.yaml, values-aws-us-west-2.yaml] }
      destination: { name: helixcare-aws-us-west-2, namespace: 'helixcare-{{path.basename}}' }
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
