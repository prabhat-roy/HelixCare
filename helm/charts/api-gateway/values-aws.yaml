cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb
  region: us-east-1
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/helixcare-api-gateway
podLabels:
  topology.kubernetes.io/region: us-east-1
nodeSelector:
  topology.kubernetes.io/region: us-east-1
envFrom:
  - secretRef: { name: api-gateway-aws-secrets }
