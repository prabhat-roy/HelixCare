cloud:
  provider: gcp
  storageClass: pd-ssd
  ingressClass: gce
  region: us-central1
serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: helixcare-api-gateway@PROJECT.iam.gserviceaccount.com
podLabels:
  topology.kubernetes.io/region: us-central1
nodeSelector:
  topology.kubernetes.io/region: us-central1
envFrom:
  - secretRef: { name: api-gateway-gcp-secrets }
