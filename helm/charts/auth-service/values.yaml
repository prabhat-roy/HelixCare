image: { repository: helixcare/auth-service, tag: "", pullPolicy: IfNotPresent }
replicaCount: 3
service: { type: ClusterIP, port: 51500, targetPort: 51500 }
resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1500m, memory: 1Gi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 51500 }, initialDelaySeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 51500 }, initialDelaySeconds: 5 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: auth-service, app.kubernetes.io/part-of: helixcare, helixcare.io/domain: identity, helixcare.io/owner-team: identity, helixcare.io/phi: "false" }
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
config: { LOG_LEVEL: info, KEYCLOAK_REALM: helixcare }
cloud: { provider: "", region: "" }
