image: { repository: helixcare/eligibility-service, tag: "", pullPolicy: IfNotPresent }
replicaCount: 2
service: { type: ClusterIP, port: 50800, targetPort: 50800 }
resources: { requests: { cpu: 250m, memory: 512Mi }, limits: { cpu: 1500m, memory: 1Gi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 50800 }, initialDelaySeconds: 30 }
  readiness: { httpGet: { path: /healthz, port: 50800 }, initialDelaySeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: eligibility-service, app.kubernetes.io/part-of: helixcare, helixcare.io/domain: insurance, helixcare.io/owner-team: insurance, helixcare.io/phi: "true" }
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
config: { LOG_LEVEL: info }
cloud: { provider: "", region: "" }
