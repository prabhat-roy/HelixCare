image: { repository: helixcare/encounter-service, tag: "", pullPolicy: IfNotPresent }
replicaCount: 3
service: { type: ClusterIP, port: 50300, targetPort: 50300 }
resources: { requests: { cpu: 250m, memory: 512Mi }, limits: { cpu: 2000m, memory: 1Gi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 50300 }, initialDelaySeconds: 30, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 50300 }, initialDelaySeconds: 10, periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: encounter-service, app.kubernetes.io/part-of: helixcare, helixcare.io/domain: clinical, helixcare.io/owner-team: clinical, helixcare.io/phi: "true" }
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
config: { LOG_LEVEL: info, FHIR_VERSION: R4 }
cloud: { provider: "", region: "" }
