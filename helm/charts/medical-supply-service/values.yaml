image: { repository: helixcare/medical-supply-service, tag: "", pullPolicy: IfNotPresent }
replicaCount: 2
service: { type: ClusterIP, port: 51200, targetPort: 51200 }
resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 1000m, memory: 768Mi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 51200 }, initialDelaySeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 51200 }, initialDelaySeconds: 5 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: medical-supply-service, app.kubernetes.io/part-of: helixcare, helixcare.io/domain: inventory, helixcare.io/owner-team: inventory, helixcare.io/phi: "false" }
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
config: { LOG_LEVEL: info }
cloud: { provider: "", region: "" }
