image: { repository: helixcare/patient-bff, tag: "", pullPolicy: IfNotPresent }
replicaCount: 2
service: { type: ClusterIP, port: 50001, targetPort: 50001 }
resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 1000m, memory: 512Mi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 50001 }, initialDelaySeconds: 15, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 50001 }, initialDelaySeconds: 5,  periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels:
  app.kubernetes.io/name: patient-bff
  app.kubernetes.io/part-of: helixcare
  helixcare.io/domain: platform
  helixcare.io/owner-team: platform
  helixcare.io/phi: "true"
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info }
cloud: { provider: "", storageClass: "", ingressClass: "", region: "" }
