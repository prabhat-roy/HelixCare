image: { repository: helixcare/video-consultation, tag: "", pullPolicy: IfNotPresent }
replicaCount: 4
service: { type: ClusterIP, port: 50600, targetPort: 50600 }
resources: { requests: { cpu: 500m, memory: 512Mi }, limits: { cpu: 2000m, memory: 2Gi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 50600 }, initialDelaySeconds: 15 }
  readiness: { httpGet: { path: /healthz, port: 50600 }, initialDelaySeconds: 5 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: video-consultation, app.kubernetes.io/part-of: helixcare, helixcare.io/domain: telehealth, helixcare.io/owner-team: telehealth, helixcare.io/phi: "true", helixcare.io/latency-tier: ultra-low }
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
config: { LOG_LEVEL: info, NATS_URL: "nats://nats.messaging:4222" }
cloud: { provider: "", region: "" }
