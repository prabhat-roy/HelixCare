apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata: { name: dicom-anomaly, namespace: helixcare-analytics }
spec:
  scaleTargetRef: { name: dicom-anomaly-service }
  minReplicaCount: 1
  maxReplicaCount: 20
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka.messaging:9092
        consumerGroup: dicom-anomaly
        topic: diagnostics.dicom.uploaded
        lagThreshold: "10"
