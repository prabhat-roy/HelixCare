---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-istio-mesh, namespace: helixcare-platform }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: istio-system } }
      ports: [{ port: 15090, protocol: TCP }, { port: 15021, protocol: TCP }, { port: 15020, protocol: TCP }]
