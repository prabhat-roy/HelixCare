apiVersion: apps/v1
kind: Deployment
metadata:
  name: readmission-predictor
  namespace: helixcare
  labels:
    app.kubernetes.io/name: readmission-predictor
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: readmission-predictor } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: readmission-predictor, helixcare.io/domain: analytics }
    spec:
      serviceAccountName: readmission-predictor
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: readmission-predictor
          image: harbor.helixcare.internal/helixcare/readmission-predictor:latest
          ports: [{ containerPort: 50302, name: http }]
          envFrom: [{ configMapRef: { name: readmission-predictor } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50302 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50302 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
