apiVersion: apps/v1
kind: Deployment
metadata:
  name: copay-service
  namespace: helixcare
  labels:
    app.kubernetes.io/name: copay-service
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: billing
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: copay-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: copay-service, helixcare.io/domain: billing }
    spec:
      serviceAccountName: copay-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: copay-service
          image: harbor.helixcare.internal/helixcare/copay-service:latest
          ports: [{ containerPort: 50162, name: http }]
          envFrom: [{ configMapRef: { name: copay-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
