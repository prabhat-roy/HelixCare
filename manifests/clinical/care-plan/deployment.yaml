apiVersion: apps/v1
kind: Deployment
metadata:
  name: care-plan
  namespace: helixcare
  labels:
    app.kubernetes.io/name: care-plan
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: clinical
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: care-plan } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: care-plan, helixcare.io/domain: clinical }
    spec:
      serviceAccountName: care-plan
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: care-plan
          image: harbor.helixcare.internal/helixcare/care-plan:latest
          ports: [{ containerPort: 50082, name: http }]
          envFrom: [{ configMapRef: { name: care-plan } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50082 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50082 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
