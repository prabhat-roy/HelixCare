apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinical-notes
  namespace: helixcare
  labels:
    app.kubernetes.io/name: clinical-notes
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: clinical
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: clinical-notes } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: clinical-notes, helixcare.io/domain: clinical }
    spec:
      serviceAccountName: clinical-notes
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: clinical-notes
          image: harbor.helixcare.internal/helixcare/clinical-notes:latest
          ports: [{ containerPort: 50081, name: http }]
          envFrom: [{ configMapRef: { name: clinical-notes } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50081 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50081 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
