apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-management
  namespace: helixcare
  labels:
    app.kubernetes.io/name: order-management
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: clinical
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: order-management } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: order-management, helixcare.io/domain: clinical }
    spec:
      serviceAccountName: order-management
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: order-management
          image: harbor.helixcare.internal/helixcare/order-management:latest
          ports: [{ containerPort: 50083, name: http }]
          envFrom: [{ configMapRef: { name: order-management } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50083 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50083 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
