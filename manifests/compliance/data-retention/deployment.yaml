apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-retention
  namespace: helixcare
  labels:
    app.kubernetes.io/name: data-retention
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: data-retention } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: data-retention, helixcare.io/domain: compliance }
    spec:
      serviceAccountName: data-retention
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: data-retention
          image: harbor.helixcare.internal/helixcare/data-retention:latest
          ports: [{ containerPort: 50321, name: http }]
          envFrom: [{ configMapRef: { name: data-retention } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50321 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50321 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
