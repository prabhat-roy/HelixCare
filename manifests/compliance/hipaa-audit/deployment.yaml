apiVersion: apps/v1
kind: Deployment
metadata:
  name: hipaa-audit
  namespace: helixcare
  labels:
    app.kubernetes.io/name: hipaa-audit
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: hipaa-audit } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: hipaa-audit, helixcare.io/domain: compliance }
    spec:
      serviceAccountName: hipaa-audit
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: hipaa-audit
          image: harbor.helixcare.internal/helixcare/hipaa-audit:latest
          ports: [{ containerPort: 50322, name: http }]
          envFrom: [{ configMapRef: { name: hipaa-audit } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50322 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50322 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
