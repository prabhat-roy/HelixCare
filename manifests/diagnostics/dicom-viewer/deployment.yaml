apiVersion: apps/v1
kind: Deployment
metadata:
  name: dicom-viewer
  namespace: helixcare
  labels:
    app.kubernetes.io/name: dicom-viewer
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: diagnostics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: dicom-viewer } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: dicom-viewer, helixcare.io/domain: diagnostics }
    spec:
      serviceAccountName: dicom-viewer
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: dicom-viewer
          image: harbor.helixcare.internal/helixcare/dicom-viewer:latest
          ports: [{ containerPort: 50103, name: http }]
          envFrom: [{ configMapRef: { name: dicom-viewer } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50103 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50103 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
