apiVersion: apps/v1
kind: Deployment
metadata:
  name: pathology-service
  namespace: helixcare
  labels:
    app.kubernetes.io/name: pathology-service
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: diagnostics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: pathology-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: pathology-service, helixcare.io/domain: diagnostics }
    spec:
      serviceAccountName: pathology-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: pathology-service
          image: harbor.helixcare.internal/helixcare/pathology-service:latest
          ports: [{ containerPort: 50102, name: http }]
          envFrom: [{ configMapRef: { name: pathology-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50102 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50102 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
