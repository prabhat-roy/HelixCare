apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  namespace: helixcare
  labels:
    app.kubernetes.io/name: document-service
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: ehr
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: document-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: document-service, helixcare.io/domain: ehr }
    spec:
      serviceAccountName: document-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: document-service
          image: harbor.helixcare.internal/helixcare/document-service:latest
          ports: [{ containerPort: 50201, name: http }]
          envFrom: [{ configMapRef: { name: document-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50201 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50201 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
