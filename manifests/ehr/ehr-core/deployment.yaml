apiVersion: apps/v1
kind: Deployment
metadata:
  name: ehr-core
  namespace: helixcare-ehr
  labels: { app.kubernetes.io/name: ehr-core, helixcare.io/domain: ehr, helixcare.io/phi: "true" }
spec:
  replicas: 4
  selector: { matchLabels: { app.kubernetes.io/name: ehr-core } }
  template:
    metadata: { labels: { app.kubernetes.io/name: ehr-core, helixcare.io/phi: "true", topology.kubernetes.io/region: us-east-1 } }
    spec:
      serviceAccountName: ehr-core
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
      nodeSelector: { topology.kubernetes.io/region: us-east-1 }
      containers:
        - name: ehr-core
          image: harbor.helixcare.internal/helixcare/ehr-core:latest
          ports: [{ containerPort: 50900, name: http }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50900 }, initialDelaySeconds: 60 }
          readinessProbe: { httpGet: { path: /healthz, port: 50900 }, initialDelaySeconds: 20 }
          resources: { requests: { cpu: 500m, memory: 1Gi }, limits: { cpu: 4000m, memory: 4Gi } }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
