apiVersion: apps/v1
kind: Deployment
metadata:
  name: fhir-gateway
  namespace: helixcare
  labels:
    app.kubernetes.io/name: fhir-gateway
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: ehr
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: fhir-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: fhir-gateway, helixcare.io/domain: ehr }
    spec:
      serviceAccountName: fhir-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: fhir-gateway
          image: harbor.helixcare.internal/helixcare/fhir-gateway:latest
          ports: [{ containerPort: 50200, name: http }]
          envFrom: [{ configMapRef: { name: fhir-gateway } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50200 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50200 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
