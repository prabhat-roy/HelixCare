apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-service
  namespace: helixcare
  labels:
    app.kubernetes.io/name: rbac-service
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: identity
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: rbac-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: rbac-service, helixcare.io/domain: identity }
    spec:
      serviceAccountName: rbac-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: rbac-service
          image: harbor.helixcare.internal/helixcare/rbac-service:latest
          ports: [{ containerPort: 50022, name: http }]
          envFrom: [{ configMapRef: { name: rbac-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50022 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50022 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
