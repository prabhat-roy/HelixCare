apiVersion: apps/v1
kind: Deployment
metadata:
  name: adjudication-service
  namespace: helixcare
  labels:
    app.kubernetes.io/name: adjudication-service
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: insurance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: adjudication-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: adjudication-service, helixcare.io/domain: insurance }
    spec:
      serviceAccountName: adjudication-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: adjudication-service
          image: harbor.helixcare.internal/helixcare/adjudication-service:latest
          ports: [{ containerPort: 50183, name: http }]
          envFrom: [{ configMapRef: { name: adjudication-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50183 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50183 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
