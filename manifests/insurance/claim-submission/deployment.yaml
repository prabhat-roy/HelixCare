apiVersion: apps/v1
kind: Deployment
metadata:
  name: claim-submission
  namespace: helixcare
  labels:
    app.kubernetes.io/name: claim-submission
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: insurance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: claim-submission } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: claim-submission, helixcare.io/domain: insurance }
    spec:
      serviceAccountName: claim-submission
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: claim-submission
          image: harbor.helixcare.internal/helixcare/claim-submission:latest
          ports: [{ containerPort: 50182, name: http }]
          envFrom: [{ configMapRef: { name: claim-submission } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50182 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50182 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
