apiVersion: apps/v1
kind: Deployment
metadata:
  name: drug-interaction
  namespace: helixcare
  labels:
    app.kubernetes.io/name: drug-interaction
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: pharmacy
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: drug-interaction } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: drug-interaction, helixcare.io/domain: pharmacy }
    spec:
      serviceAccountName: drug-interaction
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: drug-interaction
          image: harbor.helixcare.internal/helixcare/drug-interaction:latest
          ports: [{ containerPort: 50122, name: http }]
          envFrom: [{ configMapRef: { name: drug-interaction } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50122 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50122 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
