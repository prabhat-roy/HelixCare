apiVersion: apps/v1
kind: Deployment
metadata:
  name: fhir-gateway
  namespace: helixcare-platform
  labels: { app.kubernetes.io/name: fhir-gateway, helixcare.io/domain: platform, helixcare.io/phi: "true", helixcare.io/fhir-r4: "true" }
spec:
  replicas: 3
  selector: { matchLabels: { app.kubernetes.io/name: fhir-gateway } }
  template:
    metadata: { labels: { app.kubernetes.io/name: fhir-gateway, helixcare.io/phi: "true", topology.kubernetes.io/region: us-east-1 } }
    spec:
      serviceAccountName: fhir-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
      nodeSelector: { topology.kubernetes.io/region: us-east-1 }
      containers:
        - name: fhir-gateway
          image: harbor.helixcare.internal/helixcare/fhir-gateway:latest
          ports: [{ containerPort: 50005, name: http }]
          env: [{ name: FHIR_VERSION, value: R4 }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50005 }, initialDelaySeconds: 20 }
          readinessProbe: { httpGet: { path: /healthz, port: 50005 }, initialDelaySeconds: 5 }
          resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 2000m, memory: 1Gi } }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
