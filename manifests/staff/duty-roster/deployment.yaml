apiVersion: apps/v1
kind: Deployment
metadata:
  name: duty-roster
  namespace: helixcare
  labels:
    app.kubernetes.io/name: duty-roster
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: staff
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: duty-roster } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: duty-roster, helixcare.io/domain: staff }
    spec:
      serviceAccountName: duty-roster
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: duty-roster
          image: harbor.helixcare.internal/helixcare/duty-roster:latest
          ports: [{ containerPort: 50241, name: http }]
          envFrom: [{ configMapRef: { name: duty-roster } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50241 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50241 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
