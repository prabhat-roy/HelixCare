apiVersion: apps/v1
kind: Deployment
metadata:
  name: e-prescription
  namespace: helixcare
  labels:
    app.kubernetes.io/name: e-prescription
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: telehealth
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: e-prescription } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: e-prescription, helixcare.io/domain: telehealth }
    spec:
      serviceAccountName: e-prescription
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: e-prescription
          image: harbor.helixcare.internal/helixcare/e-prescription:latest
          ports: [{ containerPort: 50143, name: http }]
          envFrom: [{ configMapRef: { name: e-prescription } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50143 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50143 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
