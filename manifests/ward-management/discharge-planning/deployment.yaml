apiVersion: apps/v1
kind: Deployment
metadata:
  name: discharge-planning
  namespace: helixcare
  labels:
    app.kubernetes.io/name: discharge-planning
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: ward-management
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: discharge-planning } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: discharge-planning, helixcare.io/domain: ward-management }
    spec:
      serviceAccountName: discharge-planning
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: discharge-planning
          image: harbor.helixcare.internal/helixcare/discharge-planning:latest
          ports: [{ containerPort: 50223, name: http }]
          envFrom: [{ configMapRef: { name: discharge-planning } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50223 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50223 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
