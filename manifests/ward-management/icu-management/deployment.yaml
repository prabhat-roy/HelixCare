apiVersion: apps/v1
kind: Deployment
metadata:
  name: icu-management
  namespace: helixcare
  labels:
    app.kubernetes.io/name: icu-management
    app.kubernetes.io/part-of: helixcare
    helixcare.io/domain: ward-management
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: icu-management } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: icu-management, helixcare.io/domain: ward-management }
    spec:
      serviceAccountName: icu-management
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: icu-management
          image: harbor.helixcare.internal/helixcare/icu-management:latest
          ports: [{ containerPort: 50222, name: http }]
          envFrom: [{ configMapRef: { name: icu-management } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50222 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50222 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
