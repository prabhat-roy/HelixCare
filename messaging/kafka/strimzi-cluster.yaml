apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata: { name: helixcare-kafka, namespace: messaging }
spec:
  kafka:
    version: 3.7.1
    replicas: 6
    listeners:
      - { name: tls, port: 9093, type: internal, tls: true, authentication: { type: tls } }
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      log.message.format.version: "3.7"
      ssl.client.auth: required
    storage: { type: persistent-claim, size: 2Ti, class: gp3 }
    rack: { topologyKey: topology.kubernetes.io/zone }
  zookeeper: { replicas: 3, storage: { type: persistent-claim, size: 100Gi, class: gp3 } }
  entityOperator: { topicOperator: {}, userOperator: {} }
