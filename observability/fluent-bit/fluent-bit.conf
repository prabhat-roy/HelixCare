[SERVICE]
    Daemon Off
    HTTP_Server On
    HTTP_Port 2020
    Parsers_File parsers.conf

[INPUT]
    Name tail
    Path /var/log/containers/*helixcare*.log
    Parser docker
    Tag kube.*
    Refresh_Interval 5

[FILTER]
    Name modify
    Match *
    Add cluster helixcare

# PHI redaction - never let raw identifiers reach Loki/Elasticsearch.
# MRN
[FILTER]
    Name modify
    Match *
    Rename mrn mrn_redacted

# US National ID / SSN
[FILTER]
    Name modify
    Match *
    Rename national_id national_id_redacted

[FILTER]
    Name modify
    Match *
    Rename ssn ssn_redacted

# Date of birth - common variants
[FILTER]
    Name modify
    Match *
    Rename dob dob_redacted

[FILTER]
    Name modify
    Match *
    Rename date_of_birth date_of_birth_redacted

[FILTER]
    Name modify
    Match *
    Rename birthDate birth_date_redacted

# Patient name (FHIR HumanName) and address
[FILTER]
    Name modify
    Match *
    Rename patient_name patient_name_redacted

[FILTER]
    Name modify
    Match *
    Rename phone phone_redacted

[FILTER]
    Name modify
    Match *
    Rename email email_redacted

# Lua-based regex masking inside free-form log message text
[FILTER]
    Name lua
    Match *
    script /fluent-bit/etc/scripts/phi-redact.lua
    call redact

[OUTPUT]
    Name loki
    Match kube.*
    host loki.observability
    port 3100
    labels job=helixcare, app=$kubernetes['labels']['app.kubernetes.io/name'], domain=$kubernetes['labels']['helixcare.io/domain'], region=$kubernetes['labels']['topology.kubernetes.io/region']
