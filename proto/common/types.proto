syntax = "proto3";

package helixcare.common.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.helixcare.common.v1";
option java_multiple_files = true;

// FhirReference — the canonical pointer to a FHIR resource on the bus.
// All clinical events on Kafka carry FhirReference, never raw PHI.
// Resolving a FhirReference requires:
//   1. an audit-trail entry written first (HIPAA §164.312(b)),
//   2. an OPA `phi-access` allow decision,
//   3. a Vault DEK unwrap (envelope encryption).
message FhirReference {
  // FHIR resource type (Patient, Encounter, Observation, MedicationRequest, …)
  string resource_type = 1;

  // Logical id of the FHIR resource (NOT a raw national ID / MRN).
  string id = 2;

  // Optional version id for resource history.
  string version_id = 3;

  // Region the resource lives in. PHI MUST NOT cross regions (HIPAA + state laws).
  string region = 4;

  // Display string — should NEVER contain PHI; safe-for-logs label only.
  string display = 5;
}

// PatientToken — a hashed reference to a patient. Reverse-lookup goes through
// the audit-trail service and Vault. Never log the raw MRN or national ID.
message PatientToken {
  string token = 1;
}

// CodeableConcept — minimal FHIR CodeableConcept. SNOMED CT / ICD-10 / LOINC.
message CodeableConcept {
  message Coding {
    string system  = 1;  // e.g. "http://snomed.info/sct"
    string code    = 2;  // e.g. "44054006" (Type 2 diabetes)
    string display = 3;  // human-readable, NEVER PHI
  }
  repeated Coding coding = 1;
  string         text   = 2;
}

// Period — FHIR Period.
message Period {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end   = 2;
}

// Money — fixed-point monetary amount in minor units.
message Money {
  string currency_code = 1;  // ISO 4217
  int64  minor_units   = 2;  // e.g. 1234 = 12.34 USD
}

// Pagination — request side.
message PageRequest {
  int32  size       = 1;
  string page_token = 2;
}

// Pagination — response side.
message PageResponse {
  string next_page_token = 1;
  int64  total_size      = 2;
}

// AuditMetadata — captured on every PHI-touching write.
message AuditMetadata {
  string actor_id   = 1;
  string actor_role = 2;  // clinician | nurse | admin | patient | system
  string ip_address = 3;
  string user_agent = 4;
  string purpose    = 5;  // treatment | payment | operations | research
  google.protobuf.Timestamp event_time = 6;
}

// ConsentRef — a pointer to a FHIR Consent resource scoping this access.
// Inter-service PHI calls MUST include a ConsentRef or be rejected at the
// consumer boundary by the OPA `phi-access.rego` policy.
message ConsentRef {
  string id          = 1;
  string scope       = 2;   // e.g. "treatment", "research-deidentified"
  google.protobuf.Timestamp expires_at = 3;
}
