syntax = "proto3";
package helixcare.platform.v1;
import "common/types.proto";
import "google/protobuf/timestamp.proto";
option java_package = "com.helixcare.platform.v1";
option java_multiple_files = true;

// clinician-bff — Backend-for-frontend for the clinician dashboard.
service ClinicianBffService {
  rpc Health(HealthRequest) returns (HealthResponse);
}
message HealthRequest  {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
