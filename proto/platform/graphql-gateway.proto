syntax = "proto3";
package helixcare.platform.v1;
import "common/types.proto";
import "google/protobuf/timestamp.proto";
option java_package = "com.helixcare.platform.v1";
option java_multiple_files = true;

// graphql-gateway — federated GraphQL across BFFs.
service GraphqlGatewayService {
  rpc Health(HealthRequest) returns (HealthResponse);
}
message HealthRequest  {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
