apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: { name: helixcare-vault-issuer }
spec:
  vault:
    server: https://vault.security.svc:8200
    path: pki/sign/helixcare-mtls
    auth:
      kubernetes:
        role: helixcare-apps
        mountPath: /v1/auth/kubernetes/helixcare
        secretRef: { name: vault-issuer-token, key: token }
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: { name: helixcare-letsencrypt }
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: secops@helixcare.io
    privateKeySecretRef: { name: letsencrypt-prod-key }
    solvers: [{ http01: { ingress: { class: nginx } } }]
