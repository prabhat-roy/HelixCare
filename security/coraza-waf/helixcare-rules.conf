# Coraza WAF rules for HelixCare API surface (FHIR endpoints + patient portal).
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess On
SecRequestBodyLimit 134217728
SecResponseBodyLimit 134217728

# OWASP CRS
Include @owasp_crs/*.conf

# Block obvious PHI in URL path or query string
SecRule REQUEST_URI "@rx (?i)(ssn|mrn|national[-_]?id|date[-_]?of[-_]?birth|dob)=" \
    "id:9001,phase:1,deny,status:400,log,msg:'Possible PHI in URL'"

# FHIR specific: enforce content-type for write methods
SecRule REQUEST_METHOD "@within POST PUT PATCH" \
    "chain,id:9002,phase:1,deny,status:415,msg:'FHIR writes require fhir+json'"
SecRule REQUEST_HEADERS:Content-Type "!@within application/fhir+json application/json+fhir"
