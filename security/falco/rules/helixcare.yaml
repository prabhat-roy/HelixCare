- rule: PHI namespace shell access
  desc: Detect interactive shells in PHI namespaces
  condition: container and proc.name in (sh,bash,zsh) and k8s.ns.name in (helixcare-clinical,helixcare-ehr,helixcare-pharmacy,helixcare-telehealth,helixcare-compliance)
  output: "Interactive shell in PHI namespace (user=%user.name pod=%k8s.pod.name ns=%k8s.ns.name)"
  priority: WARNING
  tags: [helixcare, hipaa, phi]

- rule: Outbound to non-region endpoint from PHI pod
  desc: Detect cross-region egress from PHI pods
  condition: outbound and k8s.pod.label[helixcare.io/phi] = "true" and not fd.sip in (allowed_region_ips)
  output: "Cross-region egress from PHI pod (pod=%k8s.pod.name ip=%fd.sip)"
  priority: CRITICAL
  tags: [helixcare, hipaa, residency]

- rule: Suspicious DICOM access
  desc: Detect anomalous DICOM file access
  condition: open_read and fd.name pmatch (/var/dicom/*) and not proc.name in (dicom-store,dicom-viewer,dicom-anomaly)
  output: "Unauthorized DICOM access (proc=%proc.name file=%fd.name)"
  priority: ERROR
  tags: [helixcare, dicom]
